# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - golem-rag-web

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install dependencies into a folder we deploy. This lets Azure skip Oryx build (SCM_DO_BUILD_DURING_DEPLOYMENT=false) for ~3 min deploys instead of 30+ min.
      - name: Install dependencies for deployment
        run: |
          pip install -r requirements.txt --target .python_packages/lib/site-packages

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !.git/
            !antenv/

      # In Azure App Service → Configuration → Application settings, set:
      #   SCM_DO_BUILD_DURING_DEPLOYMENT = false
      #   PYTHONPATH = .python_packages/lib/site-packages
      # so the app uses this pre-built artifact and avoids a long Oryx build on each deploy.
      

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Zip artifact for deployment
        run: zip release.zip ./* -r

      # Startup command must bind to 0.0.0.0 so FemCAD/HiStruct sign-in callbacks work.
      # In Azure: Configuration → General settings → Startup Command = "python run_web.py"
      # (or "startup.sh"). Do not use "uvicorn ..." without --host 0.0.0.0.
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'golem-rag-web'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_86575C4EF39F420EB3FF93BAA7A3E4A0 }}